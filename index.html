<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surat Lamaran Kerja - Format Standar Resmi Indonesia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        .a4-paper {
            width: 210mm;
            min-height: 297mm;
            background: white;
            box-shadow: 0 25px 50px -12px rgb(15 23 42 / 0.15);
            margin: 30px auto;
            padding: 18mm 20mm;           /* Sedikit lebih kecil agar muat konten compact */
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 11.8pt;
            line-height: 1.65;            /* Lebih compact sesuai permintaan */
            color: #1f2937;
            position: relative;
            box-sizing: border-box;
        }

        @media print {
            .no-print { display: none !important; }
            body { 
                background: white !important; 
                margin: 0; 
                padding: 0; 
            }
            .preview-wrapper { 
                box-shadow: none !important; 
                padding: 0 !important; 
                margin: 0 !important;
            }
            .a4-paper {
                width: 210mm !important;
                height: auto !important;
                min-height: 297mm !important;
                margin: 0 !important;
                padding: 18mm 20mm !important;
                box-shadow: none !important;
            }

            @page {
                size: A4 portrait;
                margin: 0;
            }

            /* Anti potong - sangat penting saat line-height rapat */
            *, p, div, span, .data-diri, .isi-surat {
                overflow: visible !important;
                break-inside: avoid !important;
                page-break-inside: avoid !important;
            }

            .mt-12, .mt-20 {
                page-break-inside: avoid;
            }
        }

        .tanggal { text-align: right; margin-bottom: 10px; }
        .lampiran-perihal { margin-bottom: 22px; line-height: 1.65; }
        .alamat-tujuan { margin-bottom: 28px; }
        .isi-surat { text-align: justify; }

        .data-diri {
            display: grid;
            grid-template-columns: 195px auto;
            gap: 6px 18px;               /* Lebih rapat */
            line-height: 1.68;
            margin: 16px 0 20px 0;
        }
        .data-diri span.label {
            text-align: right;
            font-weight: 500;
            white-space: nowrap;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <!-- NAVBAR -->
    <nav class="bg-slate-950 text-white sticky top-0 z-50 no-print shadow-md">
        <div class="max-w-screen-2xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <i class="fa-solid fa-envelope text-3xl text-emerald-400"></i>
                <div>
                    <h1 class="text-2xl font-semibold tracking-tight">SURAT LAMARAN KERJA</h1>
                    <p class="text-xs text-slate-400 -mt-0.5">Format Standar Resmi Indonesia v6.9 • Compact</p>
                </div>
            </div>
            
            <div class="flex items-center gap-x-3 text-sm">
                <button onclick="autoSaveDraft()" class="flex items-center gap-x-2 px-5 h-10 bg-white/10 hover:bg-white/20 rounded-2xl font-medium">
                    <i class="fa-solid fa-floppy-disk"></i> <span class="hidden md:inline">Simpan Draft</span>
                </button>
                <button onclick="saveAsImage()" class="flex items-center gap-x-2 px-5 h-10 bg-violet-600 hover:bg-violet-700 text-white rounded-2xl font-medium">
                    <i class="fa-solid fa-image"></i> <span class="hidden sm:inline">PNG</span>
                </button>
                <button onclick="generatePDF()" class="flex items-center gap-x-2 px-6 h-10 bg-emerald-600 hover:bg-emerald-700 text-white rounded-2xl font-medium">
                    <i class="fa-solid fa-file-pdf"></i> <span>PDF Surat</span>
                </button>
                <button onclick="printLetter()" class="flex items-center gap-x-2 px-6 h-10 bg-white text-slate-950 hover:bg-slate-100 rounded-2xl font-medium">
                    <i class="fa-solid fa-print"></i> <span>Cetak</span>
                </button>
                <button onclick="clearForm()" class="flex items-center justify-center w-10 h-10 text-red-400 hover:text-red-500 rounded-2xl">
                    <i class="fa-solid fa-trash text-xl"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto px-6 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- FORM INPUT (sama seperti sebelumnya) -->
            <div class="lg:col-span-5 bg-white rounded-3xl shadow-xl p-8 no-print overflow-auto max-h-screen">
                <div class="mb-8">
                    <h2 class="text-2xl font-semibold text-slate-800">Surat Lamaran Kerja Formal</h2>
                    <p class="text-emerald-600 text-sm mt-1">Format Standar Resmi • Versi Compact</p>
                </div>
                
                <div class="space-y-8">
                    <div>
                        <h3 class="uppercase text-xs tracking-widest font-medium text-slate-500 mb-4">Data Diri Pelamar</h3>
                        <input id="nama" type="text" value="Muhammad Hafis" placeholder="Nama Lengkap" 
                               class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none mb-4" oninput="updatePreview()">
                        
                        <div class="grid grid-cols-2 gap-4">
                            <input id="tempat_lahir" type="text" value="Pekalongan" placeholder="Tempat Lahir" 
                                   class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" oninput="updatePreview()">
                            <input id="tanggal_lahir" type="text" value="15 Mei 2005" placeholder="Tanggal Lahir" 
                                   class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" oninput="updatePreview()">
                        </div>

                        <input id="alamat" type="text" value="Paninggaran, Pekalongan, Jawa Tengah" placeholder="Alamat Lengkap" 
                               class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none mt-4" oninput="updatePreview()">

                        <div class="grid grid-cols-2 gap-4 mt-4">
                            <input id="telepon" type="tel" value="0856-1234-5678" placeholder="No. Telepon / HP" 
                                   class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" oninput="updatePreview()">
                            <input id="email" type="email" value="hafis@example.com" placeholder="Email" 
                                   class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" oninput="updatePreview()">
                        </div>

                        <input id="pendidikan" type="text" value="SMK Nurul Ummah Paninggaran, Jurusan Teknik Jaringan Komputer dan Telekomunikasi, Lulus 2026" 
                               placeholder="Pendidikan Terakhir" 
                               class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none mt-4" oninput="updatePreview()">

                        <textarea id="keterampilan" rows="3" placeholder="Keterampilan Utama (pisahkan dengan koma)" 
                                  class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none mt-4" oninput="updatePreview()">Administrasi jaringan, Troubleshooting hardware & software, Instalasi perangkat jaringan, HTML, CSS, JavaScript</textarea>
                    </div>

                    <div>
                        <h3 class="uppercase text-xs tracking-widest font-medium text-slate-500 mb-2">Tempat & Tanggal Surat</h3>
                        <input id="tanggal" type="text" value="Jakarta, 20 April 2026" 
                               class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" oninput="updatePreview()">
                    </div>

                    <div>
                        <h3 class="uppercase text-xs tracking-widest font-medium text-slate-500 mb-4">Alamat Tujuan</h3>
                        <textarea id="alamat_perusahaan" rows="4" class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" 
                                  oninput="updatePreview()">Yth. Manager HRD
PT. Teknologi Digital Indonesia
Jl. Sudirman No. 45
Jakarta Selatan 12910</textarea>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <h3 class="uppercase text-xs tracking-widest font-medium text-slate-500 mb-2">Perihal</h3>
                            <input id="perihal" type="text" value="Lamaran Pekerjaan sebagai IT Support" 
                                   class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" oninput="updatePreview()">
                        </div>
                        <div>
                            <h3 class="uppercase text-xs tracking-widest font-medium text-slate-500 mb-2">Lampiran</h3>
                            <textarea id="lampiran" rows="4" class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" 
                                      oninput="updatePreview()">1. Curriculum Vitae
2. Fotokopi Ijazah
3. Fotokopi Transkrip Nilai
4. Pas Foto 3x4</textarea>
                        </div>
                    </div>

                    <div>
                        <h3 class="uppercase text-xs tracking-widest font-medium text-slate-500 mb-4">Isi Surat (Bagian Utama)</h3>
                        <textarea id="isi_surat" rows="6" class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" 
                                  oninput="updatePreview()">Dengan hormat,

Saya yang bertanda tangan di bawah ini bermaksud mengajukan lamaran pekerjaan untuk posisi IT Support di perusahaan yang Bapak/Ibu pimpin.

Berikut data diri saya:</textarea>
                    </div>
                </div>
            </div>

            <!-- PREVIEW -->
            <div class="lg:col-span-7">
                <div class="preview-header flex justify-between items-center mb-4 px-2 no-print">
                    <h3 class="font-semibold text-slate-700 flex items-center gap-x-2">
                        <i class="fa-solid fa-eye"></i> Pratinjau Surat Lamaran (Versi Compact)
                    </h3>
                    <span class="text-xs bg-emerald-100 text-emerald-700 px-4 py-1.5 rounded-3xl">FORMAT A4</span>
                </div>
                
                <div class="preview-wrapper bg-white p-6 rounded-3xl shadow-inner overflow-x-auto">
                    <div id="surat" class="a4-paper mx-auto">
                        <div id="surat-content"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updatePreview() {
            const nama = document.getElementById('nama').value || "Muhammad Hafis";
            const tempat_lahir = document.getElementById('tempat_lahir').value || "Pekalongan";
            const tanggal_lahir = document.getElementById('tanggal_lahir').value || "15 Mei 2005";
            const alamat = document.getElementById('alamat').value || "Paninggaran, Pekalongan, Jawa Tengah";
            const telepon = document.getElementById('telepon').value || "0856-1234-5678";
            const email = document.getElementById('email').value || "hafis@example.com";
            const pendidikan = document.getElementById('pendidikan').value || "SMK Nurul Ummah Paninggaran, Jurusan Teknik Jaringan Komputer dan Telekomunikasi, Lulus 2026";
            const keterampilan = document.getElementById('keterampilan').value || "";
            const tanggal = document.getElementById('tanggal').value || "Jakarta, 20 April 2026";
            const alamat_perusahaan = document.getElementById('alamat_perusahaan').value;
            const perihal = document.getElementById('perihal').value || "Lamaran Pekerjaan sebagai IT Support";
            const lampiranText = document.getElementById('lampiran').value.replace(/\n/g, '<br>');
            let isi_awal = document.getElementById('isi_surat').value.replace(/\n/g, '<br>');

            let dataDiriHTML = `
                <div class="data-diri">
                    <span class="label">Nama</span>                        <span>: ${nama}</span>
                    <span class="label">Tempat/Tanggal Lahir</span>        <span>: ${tempat_lahir}, ${tanggal_lahir}</span>
                    <span class="label">Alamat</span>                      <span>: ${alamat}</span>
                    <span class="label">No. Telepon</span>                 <span>: ${telepon}</span>
                    <span class="label">Email</span>                       <span>: ${email}</span>
                    <span class="label">Pendidikan</span>                  <span>: ${pendidikan}</span>
            `;

            if (keterampilan.trim() !== "") {
                dataDiriHTML += `<span class="label">Keterampilan</span>       <span>: ${keterampilan}</span>`;
            }
            dataDiriHTML += `</div>`;

            const contentHTML = `
                <div class="tanggal">
                    <p>${tanggal}</p>
                </div>

                <div class="lampiran-perihal">
                    <p>Lampiran : ${lampiranText || '-'}</p>
                    <p>Perihal : ${perihal}</p>
                </div>

                <div class="alamat-tujuan">
                    <p class="whitespace-pre-line">${alamat_perusahaan || 'Yth. Manager HRD<br>PT. Teknologi Digital Indonesia<br>Jl. Sudirman No. 45<br>Jakarta Selatan 12910'}</p>
                </div>

                <div class="mb-8">
                    <p><strong>Dengan hormat,</strong></p>
                </div>

                <div class="isi-surat leading-relaxed space-y-5">
                    ${isi_awal}
                    ${dataDiriHTML}
                    <p class="mt-3">Saya memiliki semangat belajar yang tinggi dan mampu bekerja dalam tim. Saya siap mengembangkan diri sesuai kebutuhan perusahaan.</p>
                    <p>Demikian surat lamaran ini saya buat dengan sebenar-benarnya. Saya berharap dapat diberikan kesempatan untuk mengikuti proses seleksi lebih lanjut. Atas perhatian dan kesempatan yang diberikan, saya ucapkan terima kasih.</p>
                </div>

                <div class="mt-10">
                    <p>Hormat saya,</p>
                    <div class="mt-16">
                        <p class="font-semibold">${nama}</p>
                        <p class="text-sm text-slate-600 mt-5">${alamat}</p>
                        <p class="text-sm text-slate-600">${telepon} | ${email}</p>
                    </div>
                </div>
            `;

            document.getElementById('surat-content').innerHTML = contentHTML;
        }

        function printLetter() {
            updatePreview();
            window.print();
        }

        function generatePDF() {
            if (confirm('Simpan sebagai PDF?\n\nPENTING:\n• Margins = None\n• Centang Background graphics\n• Scale = 100%')) {
                printLetter();
            }
        }

        function saveAsImage() {
            const surat = document.getElementById('surat');
            updatePreview();
            
            html2canvas(surat, { 
                scale: 3, 
                backgroundColor: '#ffffff',
                useCORS: true,
                height: surat.scrollHeight + 20
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Surat_Lamaran_${document.getElementById('nama').value.replace(/[^a-zA-Z0-9]/g, '_')}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }

        function autoSaveDraft() {
            const data = {
                nama: document.getElementById('nama').value,
                tempat_lahir: document.getElementById('tempat_lahir').value,
                tanggal_lahir: document.getElementById('tanggal_lahir').value,
                alamat: document.getElementById('alamat').value,
                telepon: document.getElementById('telepon').value,
                email: document.getElementById('email').value,
                pendidikan: document.getElementById('pendidikan').value,
                keterampilan: document.getElementById('keterampilan').value,
                tanggal: document.getElementById('tanggal').value,
                alamat_perusahaan: document.getElementById('alamat_perusahaan').value,
                perihal: document.getElementById('perihal').value,
                lampiran: document.getElementById('lampiran').value,
                isi_surat: document.getElementById('isi_surat').value
            };
            localStorage.setItem('suratLamaranStandar_v69', JSON.stringify(data));
            alert('Draft surat lamaran berhasil disimpan!');
        }

        function clearForm() {
            if (confirm('Reset semua isi surat?')) location.reload();
        }

        window.onload = () => {
            updatePreview();
        };
    </script>
</body>
</html>
