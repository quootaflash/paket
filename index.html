<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Kartu Ujian Siswa v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        .print-area {
            width: 210mm;
            min-height: 297mm;
            margin: 10px auto;
            padding: 5mm;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .card-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8mm;
            page-break-inside: avoid;
        }

        .single-card {
            width: 95mm;
            height: 135mm;
            border: 2.5px solid #1e2937;
            border-radius: 10px;
            padding: 10mm 8mm;
            background: white;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            page-break-inside: avoid;
        }

        /* Garis putus-putus dengan gunting */
        .cut-line {
            position: absolute;
            border: 1.5px dashed #64748b;
            pointer-events: none;
        }
        .cut-line.top    { top: -6mm; left: -6mm; right: -6mm; height: 1px; }
        .cut-line.bottom { bottom: -6mm; left: -6mm; right: -6mm; height: 1px; }
        .cut-line.left   { left: -6mm; top: -6mm; bottom: -6mm; width: 1px; }
        .cut-line.right  { right: -6mm; top: -6mm; bottom: -6mm; width: 1px; }

        .scissors {
            position: absolute;
            font-size: 14px;
            color: #64748b;
            background: white;
            padding: 0 4px;
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white; margin: 0; padding: 0; }
            .print-area { box-shadow: none; margin: 0; padding: 0; width: 210mm; }
            .single-card { box-shadow: none; margin: 4mm auto; }
            .cut-line { border-color: #94a3b8; }
        }
    </style>
</head>
<body class="bg-slate-100 font-sans">

    <nav class="bg-slate-900 text-white sticky top-0 z-50 no-print">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-id-card text-3xl text-emerald-400"></i>
                <h1 class="text-2xl font-bold">Kartu Ujian Siswa v2</h1>
            </div>
            <div class="flex gap-3">
                <button onclick="saveAsImage()" class="px-5 py-2 bg-violet-600 hover:bg-violet-700 rounded-xl flex items-center gap-2 text-sm">
                    <i class="fa-solid fa-image"></i> PNG
                </button>
                <button onclick="window.print()" class="px-6 py-2 bg-emerald-600 hover:bg-emerald-700 rounded-xl flex items-center gap-2 text-sm">
                    <i class="fa-solid fa-print"></i> CETAK (25 Siswa)
                </button>
                <button onclick="clearAll()" class="px-5 py-2 bg-red-500 hover:bg-red-600 rounded-xl flex items-center gap-2 text-sm">
                    <i class="fa-solid fa-trash"></i> Reset
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        <!-- Input -->
        <div class="lg:col-span-5 bg-white rounded-3xl shadow-xl p-8">
            <h2 class="text-2xl font-semibold mb-6">Upload Data Siswa Excel</h2>
            
            <div class="border-2 border-dashed border-slate-300 rounded-3xl p-12 text-center hover:border-emerald-400">
                <input type="file" id="excel-upload" accept=".xlsx,.xls" class="hidden" onchange="handleExcelUpload(event)">
                <button onclick="document.getElementById('excel-upload').click()" class="w-full py-10 flex flex-col items-center">
                    <i class="fa-solid fa-file-excel text-6xl mb-4 text-emerald-600"></i>
                    <span class="font-medium text-lg">Upload File Excel</span>
                </button>
            </div>

            <div class="mt-8 space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Nama Sekolah</label>
                    <input id="nama-sekolah" type="text" value="SMA NEGERI 1 PANINGGARAN" 
                           class="w-full px-5 py-3 border border-slate-200 rounded-2xl">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Alamat Sekolah</label>
                    <input id="alamat-sekolah" type="text" value="Jl. Raya Paninggaran, Pekalongan, Jawa Tengah" 
                           class="w-full px-5 py-3 border border-slate-200 rounded-2xl">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Nama Kepala Sekolah</label>
                    <input id="kepsek" type="text" value="Drs. Ahmad Fauzi, M.Pd" 
                           class="w-full px-5 py-3 border border-slate-200 rounded-2xl">
                </div>
            </div>
        </div>

        <!-- Preview -->
        <div class="lg:col-span-7">
            <div class="flex justify-between mb-4">
                <h3 class="font-semibold flex items-center gap-2"><i class="fa-solid fa-eye"></i> Pratinjau Kartu Ujian</h3>
                <span id="jumlah-kartu" class="bg-emerald-100 text-emerald-700 px-5 py-1.5 rounded-3xl text-sm">0 kartu</span>
            </div>
            
            <div class="bg-white p-6 rounded-3xl shadow-inner overflow-auto max-h-[75vh]">
                <div id="print-area" class="print-area mx-auto">
                    <div id="kartu-container" class="card-container"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let siswaData = [];

        function handleExcelUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                siswaData = XLSX.utils.sheet_to_json(worksheet);

                document.getElementById('jumlah-kartu').textContent = `${siswaData.length} kartu`;
                generateCards();
            };
            reader.readAsArrayBuffer(file);
        }

        function generateCards() {
            const container = document.getElementById('kartu-container');
            container.innerHTML = '';

            const namaSekolah = document.getElementById('nama-sekolah').value || "Nama Sekolah";
            const alamatSekolah = document.getElementById('alamat-sekolah').value || "";
            const kepsek = document.getElementById('kepsek').value || "Kepala Sekolah";

            // Tanggal hari ini
            const today = new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });

            siswaData.forEach((siswa, i) => {
                const card = document.createElement('div');
                card.className = "single-card relative";
                card.innerHTML = `
                    <div class="cut-line top"></div>
                    <div class="cut-line bottom"></div>
                    <div class="cut-line left"></div>
                    <div class="cut-line right"></div>

                    <!-- Simbol gunting di 4 sudut -->
                    <div class="scissors" style="top:-9mm; left:50%; transform:translateX(-50%);">✂️</div>
                    <div class="scissors" style="bottom:-9mm; left:50%; transform:translateX(-50%);">✂️</div>
                    <div class="scissors" style="top:50%; left:-9mm; transform:translateY(-50%); rotate(-90deg);">✂️</div>
                    <div class="scissors" style="top:50%; right:-9mm; transform:translateY(-50%); rotate(90deg);">✂️</div>

                    <div class="text-center border-b-2 border-slate-800 pb-3 mb-4">
                        <h2 class="font-bold text-[15pt] tracking-tight">${namaSekolah}</h2>
                        <p class="text-[9pt] text-slate-600">${alamatSekolah}</p>
                        <p class="mt-3 font-semibold text-emerald-700 text-lg">KARTU PESERTA UJIAN</p>
                    </div>

                    <div class="grid grid-cols-3 gap-x-3 text-[10.5pt]">
                        <div class="col-span-2 space-y-2.5">
                            <div><strong>No. Peserta</strong><br>${siswa.No || siswa['No Peserta'] || (i+1)}</div>
                            <div><strong>Nama Lengkap</strong><br><span class="font-medium">${siswa['Nama Siswa'] || siswa.Nama || '-'}</span></div>
                            <div><strong>Kelas</strong><br>${siswa.Kelas || '-'}</div>
                            <div><strong>NIS / NISN</strong><br>${siswa.NIS || siswa.NISN || '-'}</div>
                            <div><strong>Ruang Ujian</strong><br>${siswa['Ruang Ujian'] || '-'}</div>
                            <div><strong>Tanggal Ujian</strong><br>${siswa['Tanggal Ujian'] || '-'}</div>
                        </div>
                        <div class="flex justify-end items-start">
                            <div class="w-20 h-28 border border-slate-300 rounded bg-slate-50 flex items-center justify-center text-slate-400">
                                <i class="fa-solid fa-user text-4xl"></i>
                            </div>
                        </div>
                    </div>

                    <div class="mt-auto pt-6 border-t border-slate-300 text-[9.5pt]">
                        <div class="flex justify-between items-end">
                            <div>
                                Panitia Ujian<br>
                                ________________________
                            </div>
                            <div class="text-right">
                                Mengetahui,<br>
                                Kepala Sekolah<br><br><br>
                                <span class="font-medium">${kepsek}</span><br>
                                <span class="text-xs text-slate-500">${today}</span>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function saveAsImage() {
            const area = document.getElementById('print-area');
            html2canvas(area, { scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Kartu_Ujian_Siswa.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }

        function clearAll() {
            if (confirm('Hapus semua data siswa?')) {
                siswaData = [];
                document.getElementById('kartu-container').innerHTML = '';
                document.getElementById('jumlah-kartu').textContent = '0 kartu';
            }
        }

        // Contoh data awal (bisa dihapus)
        window.onload = () => {
            // Contoh 5 siswa (kamu tinggal upload Excel untuk 25 siswa)
            siswaData = [
                {"No":1, "Nama Siswa":"Muhammad Hafis", "Kelas":"XII TKJ 1", "NIS":"09876543", "Ruang Ujian":"101", "Tanggal Ujian":"20 April 2026"},
                {"No":2, "Nama Siswa":"Siti Aisyah", "Kelas":"XII TKJ 1", "NIS":"09876544", "Ruang Ujian":"101", "Tanggal Ujian":"20 April 2026"}
            ];
            generateCards();
        };
    </script>
</body>
</html>
