<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoLab - Editor Foto Online Gratis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        canvas { max-width: 100%; max-height: 70vh; border-radius: 16px; box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25); }
        .tool-btn { transition: all 0.2s; }
        .tool-btn:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="border-b border-slate-800 bg-slate-900 sticky top-0 z-50">
            <div class="px-8 py-5 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-gradient-to-br from-violet-500 to-emerald-500 rounded-2xl flex items-center justify-center">
                        <i class="fa-solid fa-image text-white text-2xl"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold tracking-tight">PhotoLab</h1>
                        <p class="text-xs text-slate-400 -mt-1">Editor Foto Online</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-4">
                    <button onclick="resetEditor()" 
                            class="flex items-center gap-2 px-5 py-3 bg-slate-800 hover:bg-slate-700 rounded-2xl text-sm font-medium">
                        <i class="fa-solid fa-rotate"></i> Reset
                    </button>
                    <button onclick="downloadImage()" 
                            class="flex items-center gap-2 px-6 py-3 bg-emerald-600 hover:bg-emerald-500 rounded-2xl font-semibold">
                        <i class="fa-solid fa-download"></i> Download
                    </button>
                </div>
            </div>
        </header>

        <div class="flex flex-col lg:flex-row h-[calc(100vh-73px)]">
            
            <!-- Sidebar Tools -->
            <div class="lg:w-72 bg-slate-900 border-r border-slate-800 p-6 overflow-y-auto">
                <h2 class="uppercase text-xs tracking-widest font-medium text-slate-400 mb-6">Tools Editing</h2>
                
                <!-- Upload -->
                <div class="mb-8">
                    <label class="block text-sm font-medium text-slate-400 mb-3">Upload Foto</label>
                    <input type="file" id="upload" accept="image/*" class="hidden" onchange="loadImage(event)">
                    <button onclick="document.getElementById('upload').click()" 
                            class="w-full h-28 border-2 border-dashed border-slate-700 hover:border-emerald-500 rounded-3xl flex flex-col items-center justify-center gap-2 text-slate-400 hover:text-white">
                        <i class="fa-solid fa-cloud-arrow-up text-3xl"></i>
                        <span class="text-sm">Pilih atau tarik foto ke sini</span>
                    </button>
                </div>

                <!-- Basic Adjustments -->
                <div class="space-y-8">
                    <div>
                        <h3 class="text-sm font-semibold mb-4 flex items-center gap-2">
                            <i class="fa-solid fa-sliders"></i> Penyesuaian
                        </h3>
                        <div class="space-y-5">
                            <div>
                                <div class="flex justify-between text-xs mb-1">
                                    <span>Brightness</span>
                                    <span id="val-brightness">100</span>
                                </div>
                                <input type="range" id="brightness" min="0" max="200" value="100" 
                                       class="w-full accent-emerald-500" oninput="applyFilters()">
                            </div>
                            <div>
                                <div class="flex justify-between text-xs mb-1">
                                    <span>Contrast</span>
                                    <span id="val-contrast">100</span>
                                </div>
                                <input type="range" id="contrast" min="0" max="200" value="100" 
                                       class="w-full accent-emerald-500" oninput="applyFilters()">
                            </div>
                            <div>
                                <div class="flex justify-between text-xs mb-1">
                                    <span>Saturation</span>
                                    <span id="val-saturation">100</span>
                                </div>
                                <input type="range" id="saturation" min="0" max="200" value="100" 
                                       class="w-full accent-emerald-500" oninput="applyFilters()">
                            </div>
                        </div>
                    </div>

                    <!-- Filters -->
                    <div>
                        <h3 class="text-sm font-semibold mb-4 flex items-center gap-2">
                            <i class="fa-solid fa-wand-magic-sparkles"></i> Filter
                        </h3>
                        <div class="grid grid-cols-3 gap-3">
                            <button onclick="applyPresetFilter('grayscale')" class="tool-btn bg-slate-800 hover:bg-slate-700 p-4 rounded-2xl text-center text-xs">Grayscale</button>
                            <button onclick="applyPresetFilter('sepia')" class="tool-btn bg-slate-800 hover:bg-slate-700 p-4 rounded-2xl text-center text-xs">Sepia</button>
                            <button onclick="applyPresetFilter('invert')" class="tool-btn bg-slate-800 hover:bg-slate-700 p-4 rounded-2xl text-center text-xs">Invert</button>
                        </div>
                    </div>

                    <!-- Transform -->
                    <div>
                        <h3 class="text-sm font-semibold mb-4 flex items-center gap-2">
                            <i class="fa-solid fa-arrows-rotate"></i> Transform
                        </h3>
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="rotateImage(90)" class="tool-btn bg-slate-800 hover:bg-slate-700 py-4 rounded-2xl flex items-center justify-center gap-2 text-sm">
                                <i class="fa-solid fa-rotate-right"></i> Rotate
                            </button>
                            <button onclick="flipImage()" class="tool-btn bg-slate-800 hover:bg-slate-700 py-4 rounded-2xl flex items-center justify-center gap-2 text-sm">
                                <i class="fa-solid fa-arrows-left-right"></i> Flip
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Preview Area -->
            <div class="flex-1 flex items-center justify-center bg-slate-950 p-8 relative" id="canvas-container">
                <canvas id="canvas" width="800" height="600" class="bg-slate-900"></canvas>
                
                <!-- Placeholder jika belum ada gambar -->
                <div id="placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-slate-500">
                    <i class="fa-solid fa-image text-8xl mb-6 opacity-30"></i>
                    <p class="text-xl font-medium">Upload foto untuk mulai mengedit</p>
                    <p class="text-sm mt-2">PNG, JPG, atau JPEG</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let canvas = new fabric.Canvas('canvas', {
            backgroundColor: '#1f2937',
            preserveObjectStacking: true
        });
        
        let originalImage = null;
        let currentFilter = '';

        function loadImage(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(event) {
                fabric.Image.fromURL(event.target.result, function(img) {
                    // Hapus objek lama
                    canvas.clear();
                    
                    // Scale gambar agar muat di canvas
                    const maxWidth = 750;
                    const maxHeight = 500;
                    let scale = 1;
                    
                    if (img.width > maxWidth || img.height > maxHeight) {
                        scale = Math.min(maxWidth / img.width, maxHeight / img.height);
                    }
                    
                    img.scale(scale);
                    img.center();
                    
                    canvas.add(img);
                    canvas.setActiveObject(img);
                    originalImage = img;
                    
                    document.getElementById('placeholder').style.display = 'none';
                    applyFilters();
                });
            };
            reader.readAsDataURL(file);
        }

        function applyFilters() {
            if (!originalImage) return;
            
            const brightness = parseFloat(document.getElementById('brightness').value) / 100;
            const contrast = parseFloat(document.getElementById('contrast').value) / 100;
            const saturation = parseFloat(document.getElementById('saturation').value) / 100;
            
            // Update nilai tampilan
            document.getElementById('val-brightness').textContent = Math.round(brightness * 100);
            document.getElementById('val-contrast').textContent = Math.round(contrast * 100);
            document.getElementById('val-saturation').textContent = Math.round(saturation * 100);
            
            // Terapkan filter
            let filters = [];
            
            filters.push(new fabric.Image.filters.Brightness({ brightness: brightness - 1 }));
            filters.push(new fabric.Image.filters.Contrast({ contrast: contrast - 1 }));
            filters.push(new fabric.Image.filters.Saturation({ saturation: saturation - 1 }));
            
            if (currentFilter === 'grayscale') filters.push(new fabric.Image.filters.Grayscale());
            if (currentFilter === 'sepia') filters.push(new fabric.Image.filters.Sepia());
            if (currentFilter === 'invert') filters.push(new fabric.Image.filters.Invert());
            
            originalImage.filters = filters;
            originalImage.applyFilters();
            canvas.renderAll();
        }

        function applyPresetFilter(filter) {
            currentFilter = (currentFilter === filter) ? '' : filter;
            applyFilters();
        }

        function rotateImage(degrees) {
            if (!originalImage) return;
            originalImage.rotate(originalImage.angle + degrees);
            canvas.renderAll();
        }

        function flipImage() {
            if (!originalImage) return;
            originalImage.flipX = !originalImage.flipX;
            canvas.renderAll();
        }

        function downloadImage() {
            if (!originalImage) {
                alert("Upload foto terlebih dahulu!");
                return;
            }
            const link = document.createElement('a');
            link.download = 'edited-photo.png';
            link.href = canvas.toDataURL({ format: 'png', quality: 1 });
            link.click();
        }

        function resetEditor() {
            if (confirm("Reset semua perubahan?")) {
                canvas.clear();
                document.getElementById('placeholder').style.display = 'flex';
                document.getElementById('brightness').value = 100;
                document.getElementById('contrast').value = 100;
                document.getElementById('saturation').value = 100;
                currentFilter = '';
                originalImage = null;
            }
        }

        // Drag & Drop Support
        const container = document.getElementById('canvas-container');
        container.addEventListener('dragover', (e) => {
            e.preventDefault();
            container.style.borderColor = '#10b981';
        });
        
        container.addEventListener('dragleave', () => {
            container.style.borderColor = '';
        });
        
        container.addEventListener('drop', (e) => {
            e.preventDefault();
            container.style.borderColor = '';
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    fabric.Image.fromURL(ev.target.result, function(img) {
                        canvas.clear();
                        const scale = Math.min(750 / img.width, 500 / img.height);
                        img.scale(scale);
                        img.center();
                        canvas.add(img);
                        originalImage = img;
                        document.getElementById('placeholder').style.display = 'none';
                    });
                };
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
