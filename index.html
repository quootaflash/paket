<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surat Lamaran Kerja ATS - Format Resmi Indonesia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        .a4-paper {
            width: 210mm;
            min-height: 297mm;
            background: white;
            box-shadow: 0 25px 50px -12px rgb(15 23 42 / 0.15);
            margin: 30px auto;
            padding: 25mm 22mm;
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 11.8pt;
            line-height: 1.9;
            color: #1f2937;
            position: relative;
            box-sizing: border-box;
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; margin: 0; padding: 0; }
            .preview-wrapper { box-shadow: none !important; padding: 0 !important; }
            .a4-paper {
                width: 210mm !important;
                min-height: 297mm !important;
                margin: 0 auto !important;
                padding: 25mm 22mm !important;
                box-shadow: none !important;
            }
        }

        .tanggal { text-align: right; margin-bottom: 10px; }
        .lampiran-perihal { margin-top: 15px; margin-bottom: 25px; }
        .alamat-tujuan { margin-bottom: 25px; }
        .isi-surat { text-align: justify; }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <!-- NAVBAR -->
    <nav class="bg-slate-950 text-white sticky top-0 z-50 no-print shadow-md">
        <div class="max-w-screen-2xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <i class="fa-solid fa-envelope text-3xl text-emerald-400"></i>
                <div>
                    <h1 class="text-2xl font-semibold tracking-tight">SURAT LAMARAN KERJA ATS</h1>
                    <p class="text-xs text-slate-400 -mt-0.5">Format Resmi Indonesia v5.8</p>
                </div>
            </div>
            
            <div class="flex items-center gap-x-3 text-sm">
                <button onclick="autoSaveDraft()" class="flex items-center gap-x-2 px-5 h-10 bg-white/10 hover:bg-white/20 rounded-2xl font-medium">
                    <i class="fa-solid fa-floppy-disk"></i> <span class="hidden md:inline">Simpan Draft</span>
                </button>
                <button onclick="saveAsImage()" class="flex items-center gap-x-2 px-5 h-10 bg-violet-600 hover:bg-violet-700 text-white rounded-2xl font-medium">
                    <i class="fa-solid fa-image"></i> <span class="hidden sm:inline">PNG</span>
                </button>
                <button onclick="generatePDF()" class="flex items-center gap-x-2 px-6 h-10 bg-emerald-600 hover:bg-emerald-700 text-white rounded-2xl font-medium">
                    <i class="fa-solid fa-file-pdf"></i> <span>PDF Surat</span>
                </button>
                <button onclick="printLetter()" class="flex items-center gap-x-2 px-6 h-10 bg-white text-slate-950 hover:bg-slate-100 rounded-2xl font-medium">
                    <i class="fa-solid fa-print"></i> <span>Cetak</span>
                </button>
                <button onclick="clearForm()" class="flex items-center justify-center w-10 h-10 text-red-400 hover:text-red-500 rounded-2xl">
                    <i class="fa-solid fa-trash text-xl"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto px-6 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- FORM INPUT -->
            <div class="lg:col-span-5 bg-white rounded-3xl shadow-xl p-8 no-print overflow-auto max-h-screen">
                <div class="mb-8">
                    <h2 class="text-2xl font-semibold text-slate-800">Surat Lamaran Kerja Formal</h2>
                    <p class="text-emerald-600 text-sm mt-1">Sesuai Standar Resmi Indonesia • Desain & Bahasa Diperbaiki</p>
                </div>
                
                <div class="space-y-8">
                    <!-- Data Diri -->
                    <div>
                        <h3 class="uppercase text-xs tracking-widest font-medium text-slate-500 mb-4">Data Diri</h3>
                        <input id="nama" type="text" value="Muhammad Hafis" placeholder="Nama Lengkap" 
                               class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none mb-4" oninput="updatePreview()">
                        
                        <div class="grid grid-cols-2 gap-4">
                            <input id="telepon" type="tel" value="0856-1234-5678" placeholder="No. Telepon" 
                                   class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" oninput="updatePreview()">
                            <input id="email" type="email" value="hafis@example.com" placeholder="Email" 
                                   class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" oninput="updatePreview()">
                        </div>
                        <input id="alamat" type="text" value="Paninggaran, Pekalongan, Jawa Tengah" placeholder="Alamat Lengkap" 
                               class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none mt-4" oninput="updatePreview()">
                    </div>

                    <!-- Tanggal -->
                    <div>
                        <h3 class="uppercase text-xs tracking-widest font-medium text-slate-500 mb-2">Tempat & Tanggal</h3>
                        <input id="tanggal" type="text" value="Jakarta, 20 April 2026" 
                               class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" oninput="updatePreview()">
                    </div>

                    <!-- Alamat Tujuan -->
                    <div>
                        <h3 class="uppercase text-xs tracking-widest font-medium text-slate-500 mb-4">Alamat Tujuan</h3>
                        <textarea id="alamat_perusahaan" rows="4" class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" 
                                  oninput="updatePreview()">Yth. Manager HRD
PT. Teknologi Digital Indonesia
Jl. Sudirman No. 45
Jakarta Selatan 12910</textarea>
                    </div>

                    <!-- Perihal & Lampiran -->
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <h3 class="uppercase text-xs tracking-widest font-medium text-slate-500 mb-2">Perihal</h3>
                            <input id="perihal" type="text" value="Lamaran Pekerjaan sebagai IT Support" 
                                   class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" oninput="updatePreview()">
                        </div>
                        <div>
                            <h3 class="uppercase text-xs tracking-widest font-medium text-slate-500 mb-2">Lampiran</h3>
                            <textarea id="lampiran" rows="4" class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" 
                                      oninput="updatePreview()">1. Curriculum Vitae
2. Fotokopi Ijazah
3. Fotokopi Transkrip Nilai
4. Pas Foto 3x4</textarea>
                        </div>
                    </div>

                    <!-- Isi Surat -->
                    <div>
                        <h3 class="uppercase text-xs tracking-widest font-medium text-slate-500 mb-4">Isi Surat</h3>
                        <textarea id="isi_surat" rows="13" class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" 
                                  oninput="updatePreview()">Dengan hormat,

Berdasarkan informasi lowongan pekerjaan yang saya peroleh, saya yang bertanda tangan di bawah ini bermaksud mengajukan lamaran untuk posisi IT Support di perusahaan yang Bapak/Ibu pimpin.

Saya adalah lulusan SMK Nurul Ummah Paninggaran jurusan Teknik Jaringan Komputer dan Telekomunikasi tahun 2026. Selama pendidikan saya telah mempelajari administrasi jaringan, troubleshooting hardware dan software, instalasi perangkat jaringan, serta dasar pemrograman web (HTML, CSS, JavaScript). Saya memiliki semangat belajar yang tinggi dan mampu bekerja dalam tim.

Demikian surat lamaran ini saya buat. Saya berharap dapat diberikan kesempatan untuk mengikuti proses seleksi lebih lanjut. Atas perhatian dan kesempatan yang diberikan, saya ucapkan terima kasih.</textarea>
                    </div>
                </div>
            </div>

            <!-- PREVIEW -->
            <div class="lg:col-span-7">
                <div class="preview-header flex justify-between items-center mb-4 px-2 no-print">
                    <h3 class="font-semibold text-slate-700 flex items-center gap-x-2">
                        <i class="fa-solid fa-eye"></i> Pratinjau Surat Lamaran (Format Resmi)
                    </h3>
                    <span class="text-xs bg-emerald-100 text-emerald-700 px-4 py-1.5 rounded-3xl">FORMAT A4</span>
                </div>
                
                <div class="preview-wrapper bg-white p-6 rounded-3xl shadow-inner overflow-x-auto">
                    <div id="surat" class="a4-paper mx-auto">
                        <div id="surat-content"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updatePreview() {
            const nama = document.getElementById('nama').value || "Muhammad Hafis";
            const telepon = document.getElementById('telepon').value;
            const email = document.getElementById('email').value;
            const alamat = document.getElementById('alamat').value;
            const tanggal = document.getElementById('tanggal').value || "Jakarta, 20 April 2026";
            const alamat_perusahaan = document.getElementById('alamat_perusahaan').value;
            const perihal = document.getElementById('perihal').value || "Lamaran Pekerjaan sebagai IT Support";
            const lampiranText = document.getElementById('lampiran').value.replace(/\n/g, '<br>');
            let isi = document.getElementById('isi_surat').value.replace(/\n/g, '<br>');

            const contentHTML = `
                <div class="tanggal">
                    <p>${tanggal}</p>
                </div>

                <div class="lampiran-perihal">
                    <p>Lampiran : ${lampiranText || 'Beberapa berkas'}</p>
                    <p>Perihal : ${perihal}</p>
                </div>

                <div class="alamat-tujuan">
                    <p class="whitespace-pre-line">${alamat_perusahaan || 'Yth. Manager HRD<br>PT. Teknologi Digital Indonesia<br>Jl. Sudirman No. 45, Jakarta Selatan 12910'}</p>
                </div>

                <div class="mb-6">
                    <p><strong>Dengan hormat,</strong></p>
                </div>

                <div class="isi-surat leading-relaxed space-y-6">
                    ${isi}
                </div>

                <div class="mt-12">
                    <p>Hormat saya,</p>
                    <div class="mt-20">
                        <p class="font-semibold">${nama}</p>
                        <p class="text-sm text-slate-600">${telepon}</p>
                        <p class="text-sm text-slate-600">${email}</p>
                        <p class="text-sm text-slate-600">${alamat}</p>
                    </div>
                </div>
            `;

            document.getElementById('surat-content').innerHTML = contentHTML;
        }

        function printLetter() {
            updatePreview();
            window.print();
        }

        function generatePDF() {
            if (confirm('Simpan sebagai PDF?\n\nTips:\n• Margins = None\n• Centang Background graphics')) {
                printLetter();
            }
        }

        function saveAsImage() {
            const surat = document.getElementById('surat');
            html2canvas(surat, { scale: 3, backgroundColor: '#ffffff' }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Surat_Lamaran_${document.getElementById('nama').value.replace(/[^a-zA-Z0-9]/g, '_')}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }

        function autoSaveDraft() {
            const data = {
                nama: document.getElementById('nama').value,
                telepon: document.getElementById('telepon').value,
                email: document.getElementById('email').value,
                alamat: document.getElementById('alamat').value,
                tanggal: document.getElementById('tanggal').value,
                alamat_perusahaan: document.getElementById('alamat_perusahaan').value,
                perihal: document.getElementById('perihal').value,
                lampiran: document.getElementById('lampiran').value,
                isi_surat: document.getElementById('isi_surat').value
            };
            localStorage.setItem('suratLamaranResmi_v58', JSON.stringify(data));
            alert('Draft surat lamaran berhasil disimpan!');
        }

        function clearForm() {
            if (confirm('Reset semua isi surat?')) location.reload();
        }

        // Inisialisasi
        window.onload = () => {
            updatePreview();
        };
    </script>
</body>
</html>
