<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pas Foto Editor CV ATS - 3x4 cm (Auto Crop)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body { font-family: 'Inter', system-ui, sans-serif; }
        
        #crop-canvas {
            max-width: 100%;
            border: 3px solid #10b981;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            cursor: move;
        }
        
        .pasfoto-frame {
            width: 120px;
            height: 160px;
            border: 4px solid #f1f5f9;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
        }
        
        .filter-slider { accent-color: #10b981; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen py-12">

    <div class="max-w-4xl mx-auto px-6">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold text-slate-900 flex items-center justify-center gap-3">
                <i class="fa-solid fa-id-card text-emerald-500"></i>
                Pas Foto Editor CV ATS
            </h1>
            <p class="text-emerald-600 font-medium">Ukuran Standar 3x4 cm • Auto Crop Rasio 3:4</p>
        </div>

        <div class="bg-white rounded-3xl shadow-xl p-8">
            <!-- Upload Area -->
            <div id="upload-area" class="border-2 border-dashed border-slate-300 hover:border-emerald-400 rounded-3xl p-12 text-center cursor-pointer transition-all"
                 onclick="document.getElementById('foto-upload').click()">
                <input type="file" id="foto-upload" accept="image/*" class="hidden" onchange="startEditor(this)">
                <i class="fa-solid fa-camera text-6xl text-slate-400 mb-4"></i>
                <p class="font-medium text-slate-700">Upload Foto untuk Pas Foto CV</p>
                <p class="text-sm text-slate-500 mt-1">Sistem akan otomatis crop ke rasio 3:4</p>
            </div>

            <!-- Editor Area -->
            <div id="editor-area" class="hidden">
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                    
                    <!-- Canvas Editor -->
                    <div class="lg:col-span-8">
                        <p class="text-sm font-medium text-slate-600 mb-3">Geser • Zoom • Sesuaikan</p>
                        <canvas id="crop-canvas" width="354" height="472"></canvas>
                        
                        <div class="mt-6 bg-slate-50 p-5 rounded-2xl">
                            <p class="text-sm font-medium mb-4">Filter Penyesuaian</p>
                            <div class="space-y-5">
                                <div>
                                    <label class="flex justify-between text-xs mb-1">
                                        <span>Kecerahan</span>
                                        <span id="val-brightness">100</span>
                                    </label>
                                    <input type="range" id="brightness" min="50" max="150" value="100" class="filter-slider w-full">
                                </div>
                                <div>
                                    <label class="flex justify-between text-xs mb-1">
                                        <span>Kontras</span>
                                        <span id="val-contrast">100</span>
                                    </label>
                                    <input type="range" id="contrast" min="50" max="150" value="100" class="filter-slider w-full">
                                </div>
                                <div>
                                    <label class="flex justify-between text-xs mb-1">
                                        <span>Saturasi Warna</span>
                                        <span id="val-saturation">100</span>
                                    </label>
                                    <input type="range" id="saturation" min="0" max="200" value="100" class="filter-slider w-full">
                                </div>
                            </div>
                            
                            <div class="flex gap-3 mt-6">
                                <button onclick="toggleGrayscale()" class="flex-1 py-2.5 text-sm bg-slate-200 hover:bg-slate-300 rounded-2xl">Hitam Putih</button>
                                <button onclick="toggleSepia()" class="flex-1 py-2.5 text-sm bg-slate-200 hover:bg-slate-300 rounded-2xl">Sepia</button>
                                <button onclick="resetFilters()" class="flex-1 py-2.5 text-sm bg-red-100 hover:bg-red-200 text-red-700 rounded-2xl">Reset Filter</button>
                            </div>
                        </div>
                    </div>

                    <!-- Preview & Tombol -->
                    <div class="lg:col-span-4">
                        <p class="text-sm font-medium text-slate-600 mb-3">Preview Pas Foto 3x4 cm</p>
                        <div id="preview-pasfoto" class="pasfoto-frame mx-auto bg-white"></div>
                        
                        <div class="mt-8 space-y-3">
                            <button onclick="downloadPasFoto()" 
                                    class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-3.5 rounded-2xl font-medium flex items-center justify-center gap-2">
                                <i class="fa-solid fa-download"></i> Download JPG 3x4 cm
                            </button>
                            
                            <button onclick="useInCV()" 
                                    class="w-full bg-violet-600 hover:bg-violet-700 text-white py-3.5 rounded-2xl font-medium flex items-center justify-center gap-2">
                                <i class="fa-solid fa-file-lines"></i> Gunakan di CV ATS
                            </button>
                            
                            <button onclick="resetAll()" 
                                    class="w-full bg-slate-200 hover:bg-slate-300 py-3.5 rounded-2xl font-medium">
                                Upload Foto Baru
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentImage = null;
        let cropX = 0, cropY = 0, cropScale = 1;
        let isDragging = false;
        let lastX = 0, lastY = 0;
        let canvas, ctx;

        // Filter
        let brightness = 100;
        let contrast = 100;
        let saturation = 100;
        let isGrayscale = false;
        let isSepia = false;

        function startEditor(input) {
            if (!input.files || !input.files[0]) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                currentImage = new Image();
                currentImage.onload = function() {
                    document.getElementById('upload-area').classList.add('hidden');
                    document.getElementById('editor-area').classList.remove('hidden');
                    
                    autoCropTo34Ratio();   // ← Auto crop jika tidak sesuai rasio
                    initCanvas();
                    resetFilters();
                };
                currentImage.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }

        // Fungsi Auto Crop ke Rasio 3:4
        function autoCropTo34Ratio() {
            const targetRatio = 3 / 4; // lebar : tinggi = 3:4
            const imageRatio = currentImage.width / currentImage.height;

            let newWidth = currentImage.width;
            let newHeight = currentImage.height;
            let offsetX = 0;
            let offsetY = 0;

            if (imageRatio > targetRatio) {
                // Foto terlalu lebar → crop sisi kiri & kanan
                newWidth = currentImage.height * targetRatio;
                offsetX = (currentImage.width - newWidth) / 2;
            } else {
                // Foto terlalu tinggi → crop atas & bawah
                newHeight = currentImage.width / targetRatio;
                offsetY = (currentImage.height - newHeight) / 2;
            }

            // Buat canvas sementara untuk crop
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = newWidth;
            tempCanvas.height = newHeight;
            const tempCtx = tempCanvas.getContext('2d');
            
            tempCtx.drawImage(
                currentImage,
                offsetX, offsetY, newWidth, newHeight,
                0, 0, newWidth, newHeight
            );

            // Ganti currentImage dengan hasil crop
            const newImg = new Image();
            newImg.onload = () => {
                currentImage = newImg;
            };
            newImg.src = tempCanvas.toDataURL('image/jpeg', 0.95);
        }

        function initCanvas() {
            canvas = document.getElementById('crop-canvas');
            ctx = canvas.getContext('2d');
            
            canvas.width = 354;   // 3x4 cm @ 300 DPI
            canvas.height = 472;

            // Hitung scale awal
            const scaleX = canvas.width / currentImage.width;
            const scaleY = canvas.height / currentImage.height;
            cropScale = Math.max(scaleX, scaleY) * 1.05;

            cropX = (canvas.width - currentImage.width * cropScale) / 2;
            cropY = (canvas.height - currentImage.height * cropScale) / 2;

            drawCanvas();

            // Event Drag & Zoom
            canvas.addEventListener('mousedown', (e) => { isDragging = true; lastX = e.offsetX; lastY = e.offsetY; });
            canvas.addEventListener('mousemove', dragImage);
            canvas.addEventListener('mouseup', () => isDragging = false);
            canvas.addEventListener('mouseleave', () => isDragging = false);
            canvas.addEventListener('wheel', zoomImage);

            // Filter sliders
            setupSliders();
        }

        function setupSliders() {
            const sliders = ['brightness', 'contrast', 'saturation'];
            sliders.forEach(id => {
                const el = document.getElementById(id);
                el.addEventListener('input', () => {
                    window[id] = parseInt(el.value);
                    document.getElementById(`val-${id}`).textContent = window[id];
                    drawCanvas();
                });
            });
        }

        function drawCanvas() {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.filter = `brightness(${brightness}%) contrast(${contrast}%) saturate(${saturation}%) 
                         ${isGrayscale ? 'grayscale(100%)' : ''} 
                         ${isSepia ? 'sepia(70%)' : ''}`;
            
            ctx.drawImage(
                currentImage,
                cropX, cropY,
                currentImage.width * cropScale,
                currentImage.height * cropScale
            );
            ctx.restore();

            updateSmallPreview();
        }

        function dragImage(e) {
            if (!isDragging) return;
            cropX += (e.offsetX - lastX);
            cropY += (e.offsetY - lastY);
            lastX = e.offsetX;
            lastY = e.offsetY;
            drawCanvas();
        }

        function zoomImage(e) {
            e.preventDefault();
            const factor = e.deltaY < 0 ? 1.08 : 0.93;
            const oldScale = cropScale;
            cropScale *= factor;
            cropX = e.offsetX - (e.offsetX - cropX) * (cropScale / oldScale);
            cropY = e.offsetY - (e.offsetY - cropY) * (cropScale / oldScale);
            drawCanvas();
        }

        function updateSmallPreview() {
            document.getElementById('preview-pasfoto').innerHTML = 
                `<img src="${canvas.toDataURL('image/jpeg', 0.95)}" class="w-full h-full object-cover">`;
        }

        function toggleGrayscale() {
            isGrayscale = !isGrayscale;
            if (isGrayscale) isSepia = false;
            drawCanvas();
        }

        function toggleSepia() {
            isSepia = !isSepia;
            if (isSepia) isGrayscale = false;
            drawCanvas();
        }

        function resetFilters() {
            brightness = 100; contrast = 100; saturation = 100;
            isGrayscale = false; isSepia = false;
            document.getElementById('brightness').value = 100;
            document.getElementById('contrast').value = 100;
            document.getElementById('saturation').value = 100;
            document.getElementById('val-brightness').textContent = 100;
            document.getElementById('val-contrast').textContent = 100;
            document.getElementById('val-saturation').textContent = 100;
            drawCanvas();
        }

        function downloadPasFoto() {
            const link = document.createElement('a');
            link.download = 'pas_foto_cv_ats_3x4.jpg';
            link.href = canvas.toDataURL('image/jpeg', 0.95);
            link.click();
        }

        function useInCV() {
            const fotoDataURL = canvas.toDataURL('image/jpeg', 0.95);
            localStorage.setItem('cvPasFoto', fotoDataURL);
            alert('✅ Pas foto 3x4 cm siap digunakan di CV ATS!\n\nFoto telah disimpan di localStorage.');
        }

        function resetAll() {
            location.reload();
        }

        window.onload = () => {
            console.log('%cPas Foto Editor CV ATS dengan Auto Crop 3:4 siap digunakan', 'color:#10b981; font-weight:bold');
        };
    </script>
</body>
</html>
