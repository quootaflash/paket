<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maintenance - Website</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #0f172a;
        color: #e5e7eb;
    }

    .card {
        background: #111827;
        padding: 40px 30px;
        border-radius: 12px;
        max-width: 420px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        border: 1px solid rgba(255,255,255,0.05);
    }

    .status {
        display: inline-block;
        padding: 6px 12px;
        font-size: 12px;
        border-radius: 20px;
        background: rgba(239, 68, 68, 0.1);
        color: #f87171;
        margin-bottom: 15px;
        letter-spacing: 1px;
    }

    h1 {
        font-size: 24px;
        margin-bottom: 10px;
    }

    p {
        font-size: 14px;
        color: #9ca3af;
        line-height: 1.6;
        margin-bottom: 25px;
    }

    .loader {
        width: 45px;
        height: 45px;
        border: 4px solid rgba(255,255,255,0.1);
        border-top: 4px solid #3b82f6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 20px auto;
    }

    @keyframes spin {
        100% { transform: rotate(360deg); }
    }

    .info {
        font-size: 13px;
        color: #6b7280;
        margin-top: 15px;
    }

    button {
        margin-top: 20px;
        padding: 10px 16px;
        border: none;
        border-radius: 6px;
        background: #3b82f6;
        color: white;
        font-size: 14px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #2563eb;
    }
</style>
</head>

<body>

<div class="card">
    <div class="status">SYSTEM MAINTENANCE</div>

    <h1>Website Sedang Tidak Tersedia</h1>

    <p>
        Saat ini sistem sedang dalam proses pemeliharaan dan pengembangan untuk meningkatkan
        performa serta kualitas layanan. Akses sementara dinonaktifkan.
    </p>

    <div class="loader"></div>

    <div class="info" id="infoText">
        Silakan coba kembali beberapa saat lagi.
    </div>

    <button onclick="reloadPage()">Muat Ulang</button>
</div>

<script>
    function reloadPage() {
        location.reload();
    }
</script>

</body>
</html>
